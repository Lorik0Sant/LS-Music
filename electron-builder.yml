appId: com.lsmusic.app
productName: LS Music
copyright: © LorikoSant
# uiohook-napi ships prebuilt N-API binaries that work across Electron versions,
# so skip electron-builder's from-source rebuild (no Visual Studio on this machine).
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  # Native module — its prebuilt .node must live outside the asar to load.
  - "**/node_modules/uiohook-napi/**"
extraResources:
  - from: overlay
    to: overlay
  - from: resources/icon.png
    to: icon.png
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  include: build/installer.nsh
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LS Music
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  artifactName: LS-Music-Setup-${version}.${ext}
  uninstallDisplayName: LS Music (LorikoSant)
publish:
  provider: github
  owner: Lorik0Sant
  repo: LS-Music
  releaseType: release
