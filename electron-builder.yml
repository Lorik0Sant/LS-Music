appId: com.lsmusic.app
productName: LS Music
copyright: © LorikoSant
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: overlay
    to: overlay
  - from: resources/icon.png
    to: icon.png
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LS Music
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  artifactName: LS-Music-Setup-${version}.${ext}
  uninstallDisplayName: LS Music (LorikoSant)
publish:
  provider: github
  owner: Lorik0Sant
  repo: LS-Music
