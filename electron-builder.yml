appId: com.lsmusic.app
productName: LS Music
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: overlay
    to: overlay
win:
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: LS Music.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: LS Music
  artifactName: LS Music-${version}-setup.${ext}
